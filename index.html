<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전! 로또 6/45 번호 추천기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        /* Lotto Ball Colors based on actual Korean Lotto standards */
        .ball-yellow {
            background: radial-gradient(circle at 30% 30%, #fef08a 0%, #eab308 50%, #ca8a04 100%);
            box-shadow: 0 4px 10px rgba(234, 179, 8, 0.4), inset -2px -2px 6px rgba(0,0,0,0.3);
            color: #1e293b;
        }
        .ball-blue {
            background: radial-gradient(circle at 30% 30%, #93c5fd 0%, #3b82f6 50%, #1d4ed8 100%);
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4), inset -2px -2px 6px rgba(0,0,0,0.3);
            color: #ffffff;
        }
        .ball-red {
            background: radial-gradient(circle at 30% 30%, #fca5a5 0%, #ef4444 50%, #b91c1c 100%);
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4), inset -2px -2px 6px rgba(0,0,0,0.3);
            color: #ffffff;
        }
        .ball-gray {
            background: radial-gradient(circle at 30% 30%, #cbd5e1 0%, #64748b 50%, #475569 100%);
            box-shadow: 0 4px 10px rgba(100, 116, 139, 0.4), inset -2px -2px 6px rgba(0,0,0,0.3);
            color: #ffffff;
        }
        .ball-green {
            background: radial-gradient(circle at 30% 30%, #86efac 0%, #22c55e 50%, #15803d 100%);
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.4), inset -2px -2px 6px rgba(0,0,0,0.3);
            color: #ffffff;
        }
        .ball-empty {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.4);
        }
        @keyframes pop {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            80% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between py-8 px-4 text-slate-100">

    <!-- Header Section -->
    <header class="w-full max-w-2xl text-center my-4">
        <div class="inline-block p-2 px-4 rounded-full bg-indigo-900/40 border border-indigo-500/30 mb-3 text-indigo-300 text-xs font-semibold tracking-wider uppercase">
            <i class="fa-solid fa-clover text-emerald-400 mr-1 animate-pulse"></i> 5게임 추천 시스템
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-amber-200 via-amber-400 to-yellow-500 bg-clip-text text-transparent">
            로또 6/45 번호 추천기
        </h1>
        <p class="text-slate-400 mt-2 text-sm md:text-base">매주 새로운 기회! 행운의 조합을 지금 바로 확인해 보세요.</p>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-2xl bg-slate-900/60 backdrop-blur-md border border-slate-800/80 rounded-3xl p-6 md:p-8 shadow-2xl flex-1 flex flex-col justify-between my-4">
        
        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 mb-8 justify-center items-center">
            <button id="generate-btn" class="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-600 hover:to-yellow-600 text-slate-900 font-black rounded-2xl shadow-lg shadow-amber-500/20 transition-all duration-300 hover:scale-105 active:scale-95 text-lg flex items-center justify-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 행운의 번호 추출하기
            </button>
            <button id="copy-btn" disabled class="w-full sm:w-auto px-6 py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold rounded-2xl border border-slate-700 transition-all duration-200 hover:text-white disabled:opacity-50 disabled:cursor-not-allowed text-base flex items-center justify-center gap-2">
                <i class="fa-solid fa-copy"></i> 전체 복사하기
            </button>
        </div>

        <!-- Games Grid -->
        <div id="games-container" class="space-y-4 md:space-y-5 my-auto">
            <!-- 5 Games will be generated here -->
            <!-- Placeholder state -->
            <div id="placeholders" class="space-y-4">
                <!-- Repeated 5 times for initial view -->
                <script>
                    for (let i = 0; i < 5; i++) {
                        document.write(`
                            <div class="flex flex-col sm:flex-row items-center justify-between p-4 bg-slate-950/40 rounded-2xl border border-slate-800/50 gap-3">
                                <span class="text-xs font-bold text-slate-500 bg-slate-900/80 py-1 px-3 rounded-full border border-slate-800">GAME ${i+1}</span>
                                <div class="flex gap-2 justify-center flex-wrap">
                                    <div class="w-11 h-11 md:w-12 md:h-12 rounded-full ball-empty flex items-center justify-center text-sm font-bold">?</div>
                                    <div class="w-11 h-11 md:w-12 md:h-12 rounded-full ball-empty flex items-center justify-center text-sm font-bold">?</div>
                                    <div class="w-11 h-11 md:w-12 md:h-12 rounded-full ball-empty flex items-center justify-center text-sm font-bold">?</div>
                                    <div class="w-11 h-11 md:w-12 md:h-12 rounded-full ball-empty flex items-center justify-center text-sm font-bold">?</div>
                                    <div class="w-11 h-11 md:w-12 md:h-12 rounded-full ball-empty flex items-center justify-center text-sm font-bold">?</div>
                                    <div class="w-11 h-11 md:w-12 md:h-12 rounded-full ball-empty flex items-center justify-center text-sm font-bold">?</div>
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <!-- Additional Information Box -->
        <div class="mt-8 p-4 bg-indigo-950/30 rounded-2xl border border-indigo-900/40 text-xs text-indigo-200/70 space-y-2">
            <h3 class="font-bold text-indigo-300 flex items-center gap-1">
                <i class="fa-solid fa-circle-info"></i> 로또 번호 색상 가이드
            </h3>
            <div class="flex flex-wrap gap-x-4 gap-y-2 pt-1">
                <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-yellow-500"></span> 1 ~ 10</span>
                <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-blue-500"></span> 11 ~ 20</span>
                <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-red-500"></span> 21 ~ 30</span>
                <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-slate-500"></span> 31 ~ 40</span>
                <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-green-500"></span> 41 ~ 45</span>
            </div>
        </div>

    </main>

    <!-- Footer Section -->
    <footer class="w-full max-w-2xl text-center mt-4 text-xs text-slate-500">
        <p>© 2026 로또 번호 추천기. 본 프로그램은 재미와 통계적 무작위 추출을 목적으로 제작되었습니다.</p>
        <p class="mt-1">행운이 함께하기를 기원합니다!</p>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-amber-300 px-6 py-3 rounded-full border border-slate-700 shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none flex items-center gap-2 font-medium text-sm">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-message">클립보드에 복사되었습니다!</span>
    </div>

    <!-- Main Logic Script -->
    <script>
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const gamesContainer = document.getElementById('games-container');
        const placeholders = document.getElementById('placeholders');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        let generatedGames = [];

        // Determine ball color class based on the lotto number
        function getBallClass(number) {
            if (number >= 1 && number <= 10) return 'ball-yellow';
            if (number >= 11 && number <= 20) return 'ball-blue';
            if (number >= 21 && number <= 30) return 'ball-red';
            if (number >= 31 && number <= 40) return 'ball-gray';
            if (number >= 41 && number <= 45) return 'ball-green';
            return 'ball-empty';
        }

        // Generate one game of lotto numbers (6 unique numbers sorted)
        function generateLottoGame() {
            const numbers = new Set();
            while (numbers.size < 6) {
                const randomNum = Math.floor(Math.random() * 45) + 1;
                numbers.add(randomNum);
            }
            return Array.from(numbers).sort((a, b) => a - b);
        }

        // Show Toast Notification
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // Handle generation of 5 games with animation
        generateBtn.addEventListener('click', () => {
            // Disable button during animation to prevent multiple clicks
            generateBtn.disabled = true;
            generateBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 추출하는 중...`;
            copyBtn.disabled = true;

            // Generate the games data immediately
            generatedGames = [];
            for (let i = 0; i < 5; i++) {
                generatedGames.push(generateLottoGame());
            }

            // Clear previous UI
            gamesContainer.innerHTML = '';

            // Render skeleton containers for the 5 games
            generatedGames.forEach((game, gameIdx) => {
                const gameRow = document.createElement('div');
                gameRow.className = "flex flex-col sm:flex-row items-center justify-between p-4 bg-slate-950/40 rounded-2xl border border-slate-800/50 gap-3 hover:border-slate-700/50 transition-colors duration-200";
                
                gameRow.innerHTML = `
                    <span class="text-xs font-bold text-slate-400 bg-slate-900/85 py-1 px-3 rounded-full border border-slate-800">GAME ${gameIdx + 1}</span>
                    <div class="flex gap-2 justify-center flex-wrap" id="game-balls-${gameIdx}">
                        <!-- Balls will be animated into here -->
                    </div>
                `;
                gamesContainer.appendChild(gameRow);
            });

            // Animate each ball appearing sequentially
            let totalDelay = 0;
            generatedGames.forEach((game, gameIdx) => {
                const ballContainer = document.getElementById(`game-balls-${gameIdx}`);
                
                game.forEach((num, numIdx) => {
                    const delay = (gameIdx * 200) + (numIdx * 80); // stagger games and balls
                    totalDelay = Math.max(totalDelay, delay);

                    setTimeout(() => {
                        const ball = document.createElement('div');
                        ball.className = `w-11 h-11 md:w-12 md:h-12 rounded-full flex items-center justify-center text-base md:text-lg font-black animate-pop ${getBallClass(num)}`;
                        ball.textContent = num;
                        ballContainer.appendChild(ball);
                        
                        // Mild sound effect or physical tap haptic if supported
                        if (navigator.vibrate) {
                            navigator.vibrate(15);
                        }
                    }, delay);
                });
            });

            // Re-enable button after animation finishes
            setTimeout(() => {
                generateBtn.disabled = false;
                generateBtn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> 행운의 번호 다시 추출`;
                copyBtn.disabled = false;
                showToast("행운의 번호가 모두 추출되었습니다!");
            }, totalDelay + 400);
        });

        // Copy generated numbers to clipboard
        copyBtn.addEventListener('click', () => {
            if (generatedGames.length === 0) return;

            let textToCopy = `[행운의 로또 추천 번호 (5게임)]\n\n`;
            generatedGames.forEach((game, idx) => {
                textToCopy += `GAME ${idx + 1}: ${game.join(', ')}\n`;
            });
            textToCopy += `\n대박을 기원합니다! 🍀`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast("추천 번호가 클립보드에 복사되었습니다!");
            }).catch(err => {
                console.error('클립보드 복사 실패:', err);
                showToast("복사 실패. 수동으로 복사해 주세요.");
            });
        });
    </script>
</body>
</html>
